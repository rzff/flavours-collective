<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <style>
            /* ... keep all existing styles from your original popup.html ... */
            body {
                width: 500px;
                max-height: 600px;
                padding: 0;
                margin: 0;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: #f8f9fa;
            }
            .container {
                display: flex;
                flex-direction: column;
                height: 100%;
            }
            .header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 20px;
                text-align: center;
                flex-shrink: 0;
            }
            .header h3 {
                margin: 0;
                font-size: 18px;
                font-weight: 600;
            }
            .content {
                padding: 20px;
                flex: 1;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .url-section {
                background: white;
                border: 1px solid #e9ecef;
                border-radius: 8px;
                padding: 15px;
                margin-bottom: 15px;
                flex-shrink: 0;
            }
            .url-display {
                word-break: break-all;
                font-size: 12px;
                color: #495057;
                background: #f8f9fa;
                padding: 8px;
                border-radius: 4px;
                margin-top: 8px;
                border: 1px solid #e9ecef;
            }
            .btn-group {
                display: flex;
                gap: 10px;
                margin-bottom: 15px;
                flex-shrink: 0;
            }
            button {
                flex: 1;
                background: #4caf50;
                border: none;
                color: white;
                padding: 12px 16px;
                text-align: center;
                font-size: 14px;
                cursor: pointer;
                border-radius: 6px;
                transition: all 0.3s;
                font-weight: 500;
            }
            button:hover {
                background: #45a049;
                transform: translateY(-1px);
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            }
            button:disabled {
                background: #6c757d;
                cursor: not-allowed;
                transform: none;
                box-shadow: none;
            }
            #scrape-with-details {
                background: #2196f3;
            }
            #scrape-with-details:hover {
                background: #1976d2;
            }

            /* New Pin Button Style */
            #pin-product-btn {
                background: #764ba2;
                margin-bottom: 15px;
                display: none;
                width: 100%;
                flex: none;
            }
            #pin-product-btn:hover {
                background: #5e3a85;
            }

            .results-section {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            .results-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
                flex-shrink: 0;
            }
            .results-count {
                font-weight: 600;
                color: #495057;
                font-size: 14px;
            }
            .export-buttons {
                display: flex;
                gap: 5px;
            }
            .export-btn {
                background: #6c757d;
                padding: 6px 12px;
                font-size: 12px;
                flex: none;
                width: auto;
            }
            .products-container {
                flex: 1;
                overflow-y: auto;
                border: 1px solid #e9ecef;
                border-radius: 8px;
                background: white;
                padding: 0;
            }
            .product-item {
                padding: 15px;
                border-bottom: 1px solid #e9ecef;
                transition: background 0.2s;
            }
            .product-name {
                font-weight: 600;
                color: #212529;
                margin-bottom: 8px;
                font-size: 14px;
            }
            .product-details {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                font-size: 12px;
            }
            .product-price {
                color: #28a745;
                font-weight: 600;
            }
            .product-stock {
                text-align: right;
            }
            .in-stock {
                color: #28a745;
                font-weight: 500;
            }
            .out-of-stock {
                color: #dc3545;
                font-weight: 500;
            }
            .product-image {
                width: 100%;
                height: 120px;
                object-fit: contain;
                border-radius: 4px;
                margin-top: 8px;
                background: #f8f9fa;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #6c757d;
                font-size: 11px;
                border: 1px solid #e9ecef;
                overflow: hidden;
            }
            .product-image img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }
            .status-message {
                padding: 15px;
                border-radius: 6px;
                margin: 10px 0;
                text-align: center;
                font-size: 14px;
            }
            .success {
                background: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }
            .error {
                background: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }
            .loading {
                background: #d1ecf1;
                color: #0c5460;
                border: 1px solid #bee5eb;
            }
            .hidden {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header"><h3>Product Scraper</h3></div>
            <div class="content">
                <div class="url-section">
                    <div
                        style="
                            font-size: 12px;
                            color: #6c757d;
                            font-weight: 500;
                        "
                    >
                        Current Page:
                    </div>
                    <div class="url-display" id="url-display">
                        Getting current page...
                    </div>
                </div>

                <div class="btn-group">
                    <button id="scrape-btn">Scrape Products</button>
                    <button id="scrape-with-details">Scrape Details</button>
                </div>

                <button id="pin-product-btn">
                    📌 Pin to Collection (Mock)
                </button>

                <button
                    id="shopify-json-btn"
                    style="
                        display: none;
                        margin-bottom: 15px;
                        background: #ff6900;
                        width: 100%;
                        flex: none;
                    "
                >
                    Print Shopify JSON to Console
                </button>

                <div id="status" class="status-message hidden"></div>

                <div class="results-section hidden" id="results-section">
                    <div class="results-header">
                        <div class="results-count" id="results-count"></div>
                        <div class="export-buttons">
                            <button class="export-btn" id="copy-json">
                                Copy JSON
                            </button>
                            <button class="export-btn" id="view-console">
                                View Console
                            </button>
                        </div>
                    </div>
                    <div
                        class="products-container"
                        id="products-container"
                    ></div>
                </div>
            </div>
        </div>
        <script src="PlatformDetector.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
